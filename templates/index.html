<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Disease Prediction</title>
<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1d2671, #c33764);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 850px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

label {
    font-size: 14px;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    outline: none;
    margin-top: 5px;
}

button {
    grid-column: span 2;
    padding: 12px;
    background: #00ffcc;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    color: black;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-size: 18px;
}

.high {
    background: rgba(255, 0, 0, 0.7);
}

.low {
    background: rgba(0, 200, 0, 0.7);
}
</style>
</head>

<body>

<div class="container">
<h1>❤️ Heart Disease Prediction</h1>

<form action="/predict" method="post" class="form-grid">

<label>Age</label>
<input type="number" name="age" required>

<label>Sex</label>
<select name="sex">
<option value="0">Female</option>
<option value="1">Male</option>
</select>

<label>Chest Pain</label>
<select name="cp">
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-anginal</option>
<option value="3">Asymptomatic</option>
</select>

<label>Resting BP</label>
<input type="number" name="trestbps" required>

<label>Cholesterol</label>
<input type="number" name="chol" required>

<label>Fasting Blood Sugar</label>
<select name="fbs">
<option value="0">Less than 120</option>
<option value="1">Greater than 120</option>
</select>

<label>Rest ECG</label>
<select name="restecg">
<option value="0">Normal</option>
<option value="1">ST-T Abnormality</option>
<option value="2">Hypertrophy</option>
</select>

<label>Max Heart Rate</label>
<input type="number" name="thalach" required>

<label>Exercise Angina</label>
<select name="exang">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<label>Oldpeak</label>
<input type="number" step="any" name="oldpeak" required>

<label>Slope</label>
<select name="slope">
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>

<label>Major Vessels</label>
<input type="number" name="ca" min="0" max="4" required>

<label>Thal</label>
<select name="thal">
<option value="0">Normal</option>
<option value="1">Fixed Defect</option>
<option value="3">Reversible Defect</option>
</select>

<button type="submit">🔍 Predict</button>

</form>

{% if prediction_text %}
<div class="result {{ 'high' if 'High' in prediction_text else 'low' }}">
    {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
